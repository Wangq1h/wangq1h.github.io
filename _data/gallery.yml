meta:
  eyebrow: Nikon Photography
  title: 流光岁月，似水年华
  description: 世界的形貌，时代的谱图，在曝光瞬间扫描与定格。
  suggestion: 新作已经按四个主题归位。每一组都采用居中的横向画廊，方便顺着节奏慢慢拖看前后几张。

featured:
  url: /assets/img/gallery/8.webp
  alt: 桥下立交结构的暗部透视

